<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Prototypes Hub</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --accent-hover: #3b82f6;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* ゲーム選択のグリッドレイアウト */
        .game-grid {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            padding: 0 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 個別のゲームカード */
        .game-card {
            background-color: var(--card-bg);
            width: 320px;
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-hover);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.3);
        }

        .card-image {
            height: 180px;
            background-color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        /* 各ゲームのイメージカラー */
        .img-cms { background: linear-gradient(135deg, #2c3e50, #000000); }
        .img-lag { background: linear-gradient(135deg, #2a3b4c, #8ba7bc); }
        .img-shinjuku { background: linear-gradient(135deg, #0000cd, #555555); }

        .card-content {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0 0 10px 0;
        }

        .card-desc {
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
            flex: 1;
        }

        .card-tags {
            display: flex;
            gap: 10px;
        }

        .tag {
            background: #334155;
            color: #94a3b8;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <header>
        <h1>PROTOTYPE LAUNCHER</h1>
        <p>プレイするタイトルを選択してください</p>
    </header>

    <div class="game-grid">
        
        <a href="game1.html" class="game-card">
            <div class="card-image img-cms">🖋️</div>
            <div class="card-content">
                <h2 class="card-title">Memorial_CMS</h2>
                <p class="card-desc">故人のブログの画像を黒塗りしていくデジタル遺品整理ホラー。事務作業が、次第に呪いの儀式へとすり替わっていく。</p>
                <div class="card-tags">
                    <span class="tag">ホラー</span>
                    <span class="tag">マウス操作</span>
                </div>
            </div>
        </a>

        <a href="game2.html" class="game-card">
            <div class="card-image img-lag">📱</div>
            <div class="card-content">
                <h2 class="card-title">1 Day Lag（仮）</h2>
                <p class="card-desc">過去の記憶と現在の部屋を重ね合わせ、証拠品を探し出す。集めた証拠をスマホのチャットに突きつけ、友人の嘘を暴け。</p>
                <div class="card-tags">
                    <span class="tag">推理・探索</span>
                    <span class="tag">ドラッグ＆ドロップ</span>
                </div>
            </div>
        </a>

        <a href="game3.html" class="game-card">
            <div class="card-image img-shinjuku">🚉</div>
            <div class="card-content">
                <h2 class="card-title">新塾駅から脱出するっぺよ！</h2>
                <p class="card-desc">巨大な迷宮「新塾駅」から地上を目指すレトロ風ADV。理不尽な罠に引っかかると即死。爆速リトライで死に覚えろ！</p>
                <div class="card-tags">
                    <span class="tag">死にゲー</span>
                    <span class="tag">コメディ</span>
                </div>
            </div>
        </a>

    </div>

</body>
</html>
